name: GameBanana Tracker

on:
  schedule:
    # Se ejecutará cada 10 minutos (minutos 0, 10, 20, 30, 40, 50)
    - cron: '*/10 * * * *' 
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar Script de Python
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python gb_tracker.py

      - name: Guardar historial de actualizaciones
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add historial.json
          git commit -m "Actualizando historial de mods" || echo "Sin novedades."
          git push
